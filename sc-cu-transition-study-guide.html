  container.appendChild(el('div', { style: 'text-align:center;margin-bottom:48px;' }, [
    el('div', {
      style: `font-family:'IBM Plex Mono',monospace;font-size:12px;color:${COLORS.accent};text-transform:uppercase;letter-spacing:3px;margin-bottom:12px;`,
      text: 'MET 5537 — Study Guide'
    }),
    el('h1', {
      style: `font-family:'Fraunces',serif;font-size:36px;font-weight:700;color:${COLORS.text};line-height:1.2;margin:0;`,
      html: `The Stratocumulus–Cumulus<br><span style="color:${COLORS.accent}">Transition</span>`
    }),
    el('p', {
      style: `font-size:15px;color:${COLORS.textDim};margin-top:16px;line-height:1.6;max-width:500px;margin-left:auto;margin-right:auto;`,
      text: 'Expand each topic for detailed notes and self-test flashcards drawn from Prof. Wing\'s lectures on the Sc–Cu transition.'
    }),
  ]));

  // Concept Cards
  concepts.forEach(c => {
    container.appendChild(renderConceptCard(c));
  });

  // Reference Sections
  referenceSections.forEach(sec => {
    container.appendChild(renderReferenceSection(sec));
  });

  // Footer
  container.appendChild(el('div', {
    style: `margin-top:32px;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:11px;color:${COLORS.textDim};`,
    text: 'Based on lectures by Prof. Allison Wing — MET 5537'
  }));

  root.appendChild(container);
  app.appendChild(root);
}

function renderConceptCard(c) {
  const isOpen = openId === c.id;
  const card = el('div', {
    class: 'concept-card',
    style: `background:${COLORS.card};border:1px solid ${isOpen ? c.color : COLORS.border};`
  });

  const header = el('div', { class: 'concept-header' }, [
    el('span', { style: 'font-size:28px;', text: c.icon }),
    el('div', { style: 'flex:1;' }, [
      el('div', {
        style: `font-family:'Fraunces',serif;font-size:20px;color:${COLORS.text};font-weight:600;`,
        text: c.title
      }),
      el('div', {
        style: `font-family:'Source Serif 4',serif;font-size:14px;color:${COLORS.textDim};margin-top:4px;line-height:1.5;`,
        text: c.summary
      }),
    ]),
    el('span', {
      class: 'arrow' + (isOpen ? ' open' : ''),
      style: `color:${c.color};font-size:20px;`,
      text: '▾'
    }),
  ]);

  header.onclick = () => { openId = (openId === c.id) ? null : c.id; render(); };
  card.appendChild(header);

  if (isOpen) {
    const body = el('div', { style: 'padding:0 24px 24px;' });
    body.appendChild(el('div', { style: `height:1px;background:${COLORS.border};margin-bottom:20px;` }));

    body.appendChild(el('div', {
      style: `font-family:'IBM Plex Mono',monospace;font-size:11px;color:${c.color};text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;`,
      text: 'Key Details'
    }));

    c.details.forEach(d => {
      body.appendChild(el('div', {
        style: `margin-bottom:16px;padding-left:16px;border-left:2px solid ${c.color}33;`
      }, [
        el('div', {
          style: `font-family:'Fraunces',serif;font-size:15px;color:${c.color};font-weight:600;margin-bottom:4px;`,
          text: d.label
        }),
        el('div', {
          style: `font-family:'Source Serif 4',serif;font-size:14px;color:${COLORS.text};line-height:1.7;opacity:0.9;`,
          text: d.content
        }),
      ]));
    });

    body.appendChild(el('div', {
      style: `margin-top:24px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:${c.color};text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;`,
      text: 'Self-Test Flashcards'
    }));
    body.appendChild(renderFlashcardDeck(c.flashcards, c.color, c.id));

    card.appendChild(body);
  }

  return card;
}

function renderFlashcardDeck(cards, color, prefix) {
  initFlashcardState(cards, prefix);
  const state = flashcardState[prefix];
  const deck = el('div');

  if (state.index >= cards.length) {
    const correct = state.results.filter(r => r).length;
    const pct = Math.round((correct / cards.length) * 100);
    const results = el('div', {
      style: `background:${COLORS.success}11;border:1px solid ${COLORS.success}33;border-radius:12px;padding:20px;text-align:center;`
    }, [
      el('div', {
        style: `font-family:'Fraunces',serif;font-size:20px;color:${COLORS.success};margin-bottom:8px;`,
        text: `${cards.length} / ${cards.length} reviewed`
      }),
      el('div', {
        style: `font-size:13px;color:${COLORS.textDim};margin-bottom:16px;`,
        text: 'All cards reviewed!'
      }),
    ]);
    const resetBtn = el('button', {
      class: 'flash-btn',
      style: `background:${color}22;border:1px solid ${color};color:${color};`,
      text: 'Reset'
    });
    resetBtn.onclick = () => { flashcardState[prefix] = { index: 0, flipped: false, results: [] }; render(); };
    results.appendChild(resetBtn);
    deck.appendChild(results);
    return deck;
  }

  const card = cards[state.index];
  const fc = el('div', {
    class: 'flashcard',
    style: `background:${state.flipped ? color + '11' : COLORS.card};border:1px solid ${state.flipped ? color : COLORS.border};`
  });

  fc.appendChild(el('div', {
    style: `font-family:'IBM Plex Mono',monospace;font-size:11px;color:${COLORS.textDim};margin-bottom:12px;`,
    text: `${state.index + 1} / ${cards.length}`
  }));

  if (!state.flipped) {
    fc.appendChild(el('div', {
      style: `font-family:'Source Serif 4',serif;font-size:15px;color:${COLORS.text};line-height:1.6;`,
      text: card.q
    }));
    fc.appendChild(el('div', {
      style: `font-family:'IBM Plex Mono',monospace;font-size:11px;color:${COLORS.textDim};margin-top:12px;`,
      text: 'Click to reveal'
    }));
    fc.onclick = () => { state.flipped = true; render(); };
  } else {
    fc.appendChild(el('div', {
      style: `font-family:'Source Serif 4',serif;font-size:15px;color:${COLORS.text};line-height:1.6;`,
      text: card.a
    }));
    fc.onclick = null;
  }

  deck.appendChild(fc);

  if (state.flipped) {
    const btnRow = el('div', { style: 'display:flex;gap:12px;margin-top:12px;justify-content:center;' });
    const gotBtn = el('button', {
      class: 'flash-btn',
      style: `background:${COLORS.success}22;border:1px solid ${COLORS.success};color:#86efac;`,
      text: 'Next'
    });
    gotBtn.onclick = () => { state.index++; state.flipped = false; render(); };
    btnRow.appendChild(gotBtn);
    deck.appendChild(btnRow);
  }

  return deck;
}

function renderReferenceSection(sec) {
  const isQuickRef = sec.title.toLowerCase().includes('quick reference');
  const wrapper = el('div', {
    style: `margin-top:${isQuickRef ? 32 : 16}px;background:${isQuickRef ? sec.color + '08' : COLORS.card};border:1px solid ${isQuickRef ? sec.color + '33' : COLORS.border};border-radius:16px;padding:24px;`
  });

  wrapper.appendChild(el('div', {
    style: `font-family:'Fraunces',serif;font-size:18px;color:${isQuickRef ? sec.color : COLORS.text};font-weight:600;margin-bottom:16px;`,
    text: sec.title
  }));

  const grid = el('div', {
    style: `display:grid;grid-template-columns:${sec.gridCols};gap:${sec.valueKey === 'val' ? 8 : 12}px;${sec.valueKey === 'val' ? "font-family:'IBM Plex Mono',monospace;font-size:13px;" : ''}`
  });

  sec.items.forEach(item => {
    if (sec.valueKey === 'val') {
      const row = el('div', {
        style: `display:flex;justify-content:space-between;padding:8px 12px;background:${COLORS.bg}88;border-radius:8px;`
      }, [
        el('span', { style: `color:${COLORS.textDim};`, text: item.label }),
        el('span', { style: `color:${COLORS.text};`, text: item.val }),
      ]);
      grid.appendChild(row);
    } else if (sec.valueKey === 'desc') {
      const cell = el('div', {
        class: 'ref-grid-item',
        style: `background:${COLORS.card};border:1px solid ${COLORS.border};`
      }, [
        el('div', { style: `font-family:'IBM Plex Mono',monospace;font-size:12px;color:${COLORS.warm};margin-bottom:4px;font-weight:500;`, text: item.label }),
        el('div', { style: `font-family:'Source Serif 4',serif;font-size:13px;color:${COLORS.textDim};line-height:1.5;`, text: item.desc }),
      ]);
      grid.appendChild(cell);
    } else {
      const cell = el('div', {
        class: 'ref-grid-item',
        style: `background:${COLORS.card};border:1px solid ${COLORS.border};`
      }, [
        el('div', { style: `font-family:'IBM Plex Mono',monospace;font-size:11px;color:${COLORS.textDim};margin-bottom:4px;`, text: item.label }),
        el('div', { style: `font-family:'IBM Plex Mono',monospace;font-size:14px;color:${COLORS.warm};`, text: item.eq }),
      ]);
      grid.appendChild(cell);
    }
  });

  wrapper.appendChild(grid);
  return wrapper;
}

// === DOM HELPER ===
function el(tag, opts, children) {
  const e = document.createElement(tag);
  if (opts) {
    if (opts.style) e.setAttribute('style', opts.style);
    if (opts.class) e.className = opts.class;
    if (opts.text) e.textContent = opts.text;
    if (opts.html) e.innerHTML = opts.html;
  }
  if (children) children.forEach(c => { if (c) e.appendChild(c); });
  return e;
}

// === INIT ===
render();
</script>
</body>
</html>
