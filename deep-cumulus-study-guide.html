const concepts = [
  {

      },
      {
        label: "Key Differences From Shallow Convection",
        content:
          "Deep convection features: ice microphysics, stronger and wider updrafts, greater depth (top bounded by tropopause, not the BL top), greater precipitation, gust fronts and cold pools, lightning, stronger downdrafts, severe weather (hail, tornadoes, straight-line wind), more complicated aerosol interactions, and the potential to organize into larger, longer-lived systems. Radiative effects also differ — anvil clouds are high and cold.",
      },
      {
        label: "Traditional vs. Real View",
        content:
          "The idealized view treats deep convection as undilute towers shooting boundary-layer air directly to the tropopause. In reality, convective towers are heterogeneous, mix strongly with the environment, are difficult to separate from it, and interact with mean wind dynamics. Most air in the tropical ascent region is actually descending.",
      },
      {
        label: "Organization",
        content:
          "Deep convection commonly organizes into: organized multicell clusters, supercells, squall lines, and mesoscale convective complexes (MCCs). Isolated cells exist but are less common than organized modes.",
      },
    ],
    flashcards: [
      {
        q: "Where is deep cumulus convection most common, and what environmental conditions favor it?",
        a: "Over tropical oceans, tropical continents, and mid-latitude continents. Favored by SST > 28°C, convergent surface winds, and high relative humidity.",

        q: "What is the 'traditional' view of deep convection, and why is it too simplistic?",

    summary:

    details: [
      {
        label: "Cumulus Stage",
        content:
          "Similar to non-precipitating convection but with a stronger updraft. Air moves upward from the subcloud layer at all levels. The cloud tower grows vigorously before precipitation forms.",
      },
      {
        label: "Mature Stage",
        content:

        label: "Dissipating Stage",

      },

        label: "Lifetime Estimate",
        content:

      },
      {
        label: "Clustering",
        content:

  {

        label: "Why Precipitation Makes Convection Irreversible",
        content:
          "In non-precipitating convection, buoyancy is determined by a parcel's origin, position, and mixing history. Falling precipitation breaks this constraint: it introduces direct negative buoyancy (drag), negative buoyancy from evaporation, and a buoyancy sink from snow melting. These effects are displaced from updrafts by gravity, changing convective geometry and enabling propagation relative to the mean flow.",
      },
      {
        label: "Three Buoyancy Effects of Precipitation",
        content:
          "1) Direct negative buoyancy: drag exerted by the weight of condensed water on surrounding air. 2) Evaporative negative buoyancy: precipitation evaporates in sub-saturated air, cooling it. 3) Melting sink: melting of snow and graupel absorbs latent heat, creating a buoyancy sink.",
      },
      {
        label: "Gust Front and Cold Pool",
        content:
          "The gust front is associated with a wind shift and replaces ambient, conditionally unstable air with cooler air having lower equivalent potential temperature (θ_e). The spreading cold air moves like a density current (head, nose, turbulent wake structure). It can trigger new convection at its leading edge.",
      },
      {
        label: "Remote Sensing Challenges",
        content:
          "The simultaneous presence of ice crystals, liquid drops, and a range of rimed ice species makes remote sensing challenging — hydrometeors are not homogeneous spheres. Fall speeds depend on temperature and history, and there is strong potential for interactions between deep convective dynamics and the aerosol environment.",
      },
    ],
    flashcards: [
      {
        q: "Name the three ways falling precipitation creates negative buoyancy.",
        a: "1) Direct drag from condensed water weight. 2) Evaporative cooling in sub-saturated air. 3) Latent heat absorption during snow/graupel melting.",
      },
      {
        q: "What is a cold pool and how does it move?",

      },
      {
        q: "Why is precipitating convection described as 'strongly irreversible'?",

      },
      {
        q: "Why is remote sensing difficult for deep convective clouds?",
        a: "They contain a mix of ice crystals, liquid drops, and rimed species — not homogeneous spheres — so standard radar/microwave retrieval assumptions break down.",
      },
    ],
  },
  {
    id: "gravity-waves",
    title: "Gravity Waves & Atmospheric Adjustment",
    icon: "🌊",
    color: "#34d399",
    summary:
      "Deep convection adjusts the far-field temperature profile via gravity wave propagation — not advection — operating on a fast timescale compared to moisture adjustment.",
    details: [
      {
        label: "Convection as a Heat Source?",

        content:

        label: "Fast Temperature, Slow Moisture",

      },
      {
        label: "Unlike Dry Convection",
        content:
          "In dry Rayleigh-Bénard convection, adjustment occurs via advection. In moist deep convection, adjustment of far-field temperature profiles occurs via gravity waves — even in unsaturated regions far from the active cloud.",
      },
    ],
    flashcards: [
      {
        q: "Why can't deep convection be treated as a simple heat source to the atmosphere?",

      },
      {
        q: "How is the temperature profile of deep convection communicated to the rest of the atmosphere?",

        a: "Temperature adjusts quickly via gravity waves (timescale = distance/wave speed). Moisture adjusts slowly, governed by horizontal stirring along isentropes and clear-sky subsidence.",
      },
      {
        q: "What is the Brunt-Väisälä frequency N and what does it measure?",
        a: "N = √(g/θv · ∂θv/∂z) — it measures the static stability of the environment and sets the gravity wave phase speed.",

    ],

  {

      {

        a: "Ice-graupel collisions cause charge separation: positive charges move to cloud top, negative charges accumulate in the middle. When the electric field becomes large enough, lightning discharges.",

        a: "Larger hailstones are heavier; fast updrafts keep them suspended longer, allowing repeated cycling through supercooled water to build up more ice layers.",
      },
    ],
  },
  {
    id: "environments",
    title: "Triggered vs. Quasi-Equilibrium Convection",
    icon: "📈",
    color: COLORS.warm,
    summary:

    details: [
      {
        label: "Triggered (Episodic) Convection",
        content:
          "CAPE builds up over time while a capping inversion (CIN) suppresses convection. When a trigger (e.g., frontal lifting, sea breeze, orographic forcing) overcomes the cap, convection fires explosively with high CAPE. Example: Great Plains supercell environments (Norman, OK sounding on 09 May 2003 shows CAPE ~3816 J/kg with significant CIN).",

        label: "Quasi-Equilibrium (QE) Convection",

        q: "What is convective inhibition (CIN) and what role does it play?",

const referenceSections = [];

// === STATE ===
let openId = null;
const flashcardState = {};

function initFlashcardState(cards, prefix) {
  if (!flashcardState[prefix]) {
    flashcardState[prefix] = { index: 0, flipped: false, results: [] };
  }
}

// === RENDER ===
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  const root = el('div', {
    style: `min-height:100vh;background:${COLORS.bg};padding:40px 20px;font-family:'Source Serif 4',serif;`
  });

  const container = el('div', { style: 'max-width:720px;margin:0 auto;' });

  // Header
  container.appendChild(el('div', { style: 'text-align:center;margin-bottom:48px;' }, [
    el('div', {
      style: `font-family:'IBM Plex Mono',monospace;font-size:12px;color:${COLORS.accent};text-transform:uppercase;letter-spacing:3px;margin-bottom:12px;`,
      text: "MET 5537 — Study Guide"
    }),
    el('h1', {
      style: `font-family:'Fraunces',serif;font-size:36px;font-weight:700;color:${COLORS.text};line-height:1.2;margin:0;`,
      html: `Moist Convection:<br><span style="color:${COLORS.accent}">Deep Cumulus</span>`
    }),
    el('p', {
      style: `font-size:15px;color:${COLORS.textDim};margin-top:16px;line-height:1.6;max-width:500px;margin-left:auto;margin-right:auto;`,
      text: "Expand each topic for detailed notes and self-test flashcards drawn from Prof. Wing's lectures on deep cumulus convection."
    }),
  ]));

  // Concept Cards
  concepts.forEach(c => {
    container.appendChild(renderConceptCard(c));
  });

  // Reference Sections
  referenceSections.forEach(sec => {
    container.appendChild(renderReferenceSection(sec));
  });

  // Footer
  container.appendChild(el('div', {
    style: `margin-top:32px;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:11px;color:${COLORS.textDim};`,
    text: "Based on lectures by Prof. Allison Wing — MET 5537"
  }));

  root.appendChild(container);
  app.appendChild(root);
}

function renderConceptCard(c) {
  const isOpen = openId === c.id;
  const card = el('div', {
    class: 'concept-card',
    style: `background:${COLORS.card};border:1px solid ${isOpen ? c.color : COLORS.border};`
  });

  // Header
  const header = el('div', { class: 'concept-header' }, [
    el('span', { style: 'font-size:28px;', text: c.icon }),
    el('div', { style: 'flex:1;' }, [
      el('div', {
        style: `font-family:'Fraunces',serif;font-size:20px;color:${COLORS.text};font-weight:600;`,
        text: c.title
      }),
      el('div', {
        style: `font-family:'Source Serif 4',serif;font-size:14px;color:${COLORS.textDim};margin-top:4px;line-height:1.5;`,
        text: c.summary
      }),
    ]),
    el('span', {
      class: 'arrow' + (isOpen ? ' open' : ''),
      style: `color:${c.color};font-size:20px;`,
      text: '▾'
    }),
  ]);

  header.onclick = () => { openId = (openId === c.id) ? null : c.id; render(); };
  card.appendChild(header);

  if (isOpen) {
    const body = el('div', { style: 'padding:0 24px 24px;' });
    body.appendChild(el('div', { style: `height:1px;background:${COLORS.border};margin-bottom:20px;` }));

    // Key Details label
    body.appendChild(el('div', {
      style: `font-family:'IBM Plex Mono',monospace;font-size:11px;color:${c.color};text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;`,
      text: 'Key Details'
    }));

    // Details
    c.details.forEach(d => {
      body.appendChild(el('div', {
        style: `margin-bottom:16px;padding-left:16px;border-left:2px solid ${c.color}33;`
      }, [
        el('div', {
          style: `font-family:'Fraunces',serif;font-size:15px;color:${c.color};font-weight:600;margin-bottom:4px;`,
          text: d.label
        }),
        el('div', {
          style: `font-family:'Source Serif 4',serif;font-size:14px;color:${COLORS.text};line-height:1.7;opacity:0.9;`,
          text: d.content
        }),
      ]));
    });

    // Flashcards
    body.appendChild(el('div', {
      style: `margin-top:24px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:${c.color};text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;`,
      text: 'Self-Test Flashcards'
    }));
    body.appendChild(renderFlashcardDeck(c.flashcards, c.color, c.id));

    card.appendChild(body);
  }

  return card;
}

function renderFlashcardDeck(cards, color, prefix) {
  initFlashcardState(cards, prefix);
  const state = flashcardState[prefix];
  const deck = el('div');

  if (state.index >= cards.length) {
    // Results
    const correct = state.results.filter(r => r).length;
    const pct = Math.round((correct / cards.length) * 100);
    const results = el('div', {
      style: `background:${COLORS.success}11;border:1px solid ${COLORS.success}33;border-radius:12px;padding:20px;text-align:center;`
    }, [
      el('div', {
        style: `font-family:'Fraunces',serif;font-size:20px;color:${COLORS.success};margin-bottom:8px;`,
        text: `${cards.length} / ${cards.length} reviewed`
      }),
      el('div', {
        style: `font-size:13px;color:${COLORS.textDim};margin-bottom:16px;`,
        text: 'All cards reviewed!'
      }),
    ]);
    const resetBtn = el('button', {
      class: 'flash-btn',
      style: `background:${color}22;border:1px solid ${color};color:${color};`,
      text: 'Reset'
    });
    resetBtn.onclick = () => { flashcardState[prefix] = { index: 0, flipped: false, results: [] }; render(); };
    results.appendChild(resetBtn);
    deck.appendChild(results);
    return deck;
  }

  const card = cards[state.index];
  const fc = el('div', {
    class: 'flashcard',
    style: `background:${state.flipped ? color + '11' : COLORS.card.replace('#', '#')};border:1px solid ${state.flipped ? color : COLORS.border};`
  });

  // Counter
  fc.appendChild(el('div', {
    style: `font-family:'IBM Plex Mono',monospace;font-size:11px;color:${COLORS.textDim};margin-bottom:12px;`,
    text: `${state.index + 1} / ${cards.length}`
  }));

  if (!state.flipped) {
    fc.appendChild(el('div', {
      style: `font-family:'Source Serif 4',serif;font-size:15px;color:${COLORS.text};line-height:1.6;`,
      text: card.q
    }));
    fc.appendChild(el('div', {
      style: `font-family:'IBM Plex Mono',monospace;font-size:11px;color:${COLORS.textDim};margin-top:12px;`,
      text: 'Click to reveal'
    }));
    fc.onclick = () => { state.flipped = true; render(); };
  } else {
    fc.appendChild(el('div', {
      style: `font-family:'Source Serif 4',serif;font-size:15px;color:${COLORS.text};line-height:1.6;`,
      text: card.a
    }));
    fc.onclick = null;
  }

  deck.appendChild(fc);

  if (state.flipped) {
    const btnRow = el('div', { style: 'display:flex;gap:12px;margin-top:12px;justify-content:center;' });
    const gotBtn = el('button', {
      class: 'flash-btn',
      style: `background:${COLORS.success}22;border:1px solid ${COLORS.success};color:#86efac;`,
      text: 'Next'
    });
    gotBtn.onclick = () => { state.index++; state.flipped = false; render(); };
    btnRow.appendChild(gotBtn);
    deck.appendChild(btnRow);
  }

  return deck;
}

function renderReferenceSection(sec) {
  const isQuickRef = sec.title.toLowerCase().includes('quick reference');
  const wrapper = el('div', {
    style: `margin-top:${isQuickRef ? 32 : 16}px;background:${isQuickRef ? sec.color + '08' : COLORS.card};border:1px solid ${isQuickRef ? sec.color + '33' : COLORS.border};border-radius:16px;padding:24px;`
  });

  wrapper.appendChild(el('div', {
    style: `font-family:'Fraunces',serif;font-size:18px;color:${isQuickRef ? sec.color : COLORS.text};font-weight:600;margin-bottom:16px;`,
    text: sec.title
  }));

  const grid = el('div', {
    style: `display:grid;grid-template-columns:${sec.gridCols};gap:${sec.valueKey === 'val' ? 8 : 12}px;${sec.valueKey === 'val' ? "font-family:'IBM Plex Mono',monospace;font-size:13px;" : ''}`
  });

  sec.items.forEach(item => {
    if (sec.valueKey === 'val') {
      const row = el('div', {
        style: `display:flex;justify-content:space-between;padding:8px 12px;background:${COLORS.bg}88;border-radius:8px;`
      }, [
        el('span', { style: `color:${COLORS.textDim};`, text: item.label }),
        el('span', { style: `color:${COLORS.text};`, text: item.val }),
      ]);
      grid.appendChild(row);
    } else if (sec.valueKey === 'desc') {
      const cell = el('div', {
        class: 'ref-grid-item',
        style: `background:${COLORS.card};border:1px solid ${COLORS.border};`
      }, [
        el('div', { style: `font-family:'IBM Plex Mono',monospace;font-size:12px;color:${COLORS.warm};margin-bottom:4px;font-weight:500;`, text: item.label }),
        el('div', { style: `font-family:'Source Serif 4',serif;font-size:13px;color:${COLORS.textDim};line-height:1.5;`, text: item.desc }),
      ]);
      grid.appendChild(cell);
    } else {
      const cell = el('div', {
        class: 'ref-grid-item',
        style: `background:${COLORS.card};border:1px solid ${COLORS.border};`
      }, [
        el('div', { style: `font-family:'IBM Plex Mono',monospace;font-size:11px;color:${COLORS.textDim};margin-bottom:4px;`, text: item.label }),
        el('div', { style: `font-family:'IBM Plex Mono',monospace;font-size:14px;color:${COLORS.warm};`, text: item.eq }),
      ]);
      grid.appendChild(cell);
    }
  });

  wrapper.appendChild(grid);
  return wrapper;
}

// === DOM HELPER ===
function el(tag, opts, children) {
  const e = document.createElement(tag);
  if (opts) {
    if (opts.style) e.setAttribute('style', opts.style);
    if (opts.class) e.className = opts.class;
    if (opts.text) e.textContent = opts.text;
    if (opts.html) e.innerHTML = opts.html;
  }
  if (children) children.forEach(c => { if (c) e.appendChild(c); });
  return e;
}

// === INIT ===
render();
</script>
